name: Update market data

# يحدّث أسعار السوقين يوميًا بعد الإغلاق ثم يدفع التغيير،
# فيُعاد بناء الموقع ونشره على GitHub Pages عبر مُشغّل workflow_run في deploy.yml.

on:
  schedule:
    # 12:00 UTC = 16:00 بتوقيت دبي (بعد إغلاق الجلسة)، أيام الإثنين–الجمعة.
    - cron: '0 12 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest prices
        run: node scripts/update-data.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add public/data.json src/data/seed.json
          if git diff --staged --quiet; then
            echo "لا تغييرات في البيانات."
          else
            git commit -m "chore(data): تحديث أسعار يومي"
            git push
          fi

      # تنبيه عند فشل الجلب: يفتح Issue واحدًا (أو يعلّق على القائم) بدل التجاهل الصامت.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="⚠️ فشل تحديث بيانات السوق اليومي"
          body="فشل سير عمل \"Update market data\" بتاريخ $(date -u +%F). راجع السجل: $RUN_URL"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body" || true
          else
            gh issue create --title "$title" --body "$body" || true
          fi
