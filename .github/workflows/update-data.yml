name: Update market data

# يحدّث أسعار أسهم سوق دبي يوميًا بعد إغلاق السوق ثم يدفع التغيير،
# ما يُطلق إعادة نشر تلقائية على Vercel.

on:
  schedule:
    # 12:00 UTC = 16:00 بتوقيت دبي (بعد إغلاق الجلسة)، أيام الإثنين–الجمعة.
    - cron: '0 12 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest prices
        run: node scripts/update-data.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "لا تغييرات في البيانات."
          else
            git commit -m "chore(data): تحديث أسعار يومي [skip ci]"
            git push
          fi
